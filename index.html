<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps — supplymarket.de</title>
<meta name="description" content="Apps von Supplymarket: Werkzeuge für Microsoft 365 Administration.">
<link rel="icon" type="image/png" href="icon.png">
<style>
  :root { --accent: #14a06e; --ink: #1c2b26; --muted: #5b6b65; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         color: var(--ink); background: #fafcfb; line-height: 1.6; }
  main { max-width: 640px; margin: 0 auto; padding: 48px 24px 64px; }
  h1 { margin: 0 0 4px; font-size: 1.9rem; }
  .sub { color: var(--muted); margin: 0 0 32px; }
  .app-card { display: flex; gap: 20px; align-items: center; padding: 20px;
              background: #fff; border: 1px solid #e3eae7; border-radius: 16px;
              text-decoration: none; color: inherit; transition: box-shadow .15s ease; }
  .app-card:hover { box-shadow: 0 8px 24px rgba(20,160,110,.12); }
  .app-card img { width: 72px; height: 72px; border-radius: 16px; flex-shrink: 0; }
  .app-card h2 { margin: 0 0 4px; font-size: 1.15rem; }
  .app-card p { margin: 0; color: var(--muted); font-size: .92rem; }
  footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e3eae7; color: var(--muted); font-size: .85rem; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <h1>Apps</h1>
  <p class="sub">Werkzeuge für Microsoft 365 Administration / Tools for Microsoft 365 administration</p>

  <a class="app-card" href="q-manager/">
    <img src="q-manager/icon.png" alt="Q-Manager App-Icon">
    <div>
      <h2>Q-Manager</h2>
      <p>M365 Quarantine Manager for iOS — die Microsoft 365 E-Mail-Quarantäne direkt am iPhone verwalten.</p>
    </div>
  </a>

  <footer>
    Kontakt / Contact: <a href="mailto:nils@supplymarket.de">nils@supplymarket.de</a>
  </footer>
</main>
</body>
</html>
